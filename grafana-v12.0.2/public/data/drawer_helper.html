<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Drawer Helper</title>
<style>
  :root { color-scheme: light dark; }
  body{font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;margin:0;padding:12px;color:#083B3A;background:transparent}
  .box{padding:12px;background:#fff;border-left:5px solid #009688;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
  .row{margin-top:6px}
  .muted{color:#14504e}
  @media (prefers-color-scheme: dark){
    body{color:#e5f3f2}
    .box{background:#0f172a;border-left-color:#00b3a6}
    .muted{color:#94a3b8}
  }
</style>
</head>
<body>
<div id="box" class="box" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h3 style="margin:0">Correlation &amp; Recommendations</h3>
    <a id="closeLink" href="#" style="text-decoration:none;font-weight:600">Close ✖</a>
  </div>
  <div class="row"><b>Focus:</b> <span id="recFocus">—</span></div>
  <div class="row"><b>Signals:</b> <span id="recSignals" class="muted">—</span></div>
  <div class="row"><b>Correlated SQLs:</b> <span id="recSQLs" class="muted">—</span></div>
  <div class="row"><b>Correlated Segments:</b> <span id="recSegments" class="muted">—</span></div>
  <div class="row"><b>Recommendations:</b><div id="recText" class="row muted">—</div></div>
</div>

<script>
(function(){
  try{
    // Read variables from the parent dashboard URL safely (works in sandbox).
    var parentURL = document.referrer ? new URL(document.referrer) : null;
    var p = parentURL ? parentURL.searchParams : new URLSearchParams();

    var openFlag = (p.get('var-open_drawer') || '').toString().toLowerCase() === 'true';
    var ftype = p.get('var-focus_type') || '';
    var fval  = p.get('var-focus_value') || '';

    var box   = document.getElementById('box');
    var close = document.getElementById('closeLink');

    // Close → navigate parent to the same path without query (just hides drawer on refresh)
    close.addEventListener('click', function(e){
      e.preventDefault();
      try { window.top.location.href = window.top.location.pathname; } catch(_) {}
    });

    if (!openFlag) { box.style.display = 'none'; return; }

    box.style.display = 'block';
    document.getElementById('recFocus').textContent =
      (ftype ? ftype + ': ' : '') + (fval || '—');
    document.getElementById('recSignals').textContent =
      'Scope: ' + (p.get('var-wait_scope') || 'All') +
      ' | Range: ' + (p.get('var-start_snap') || '-') + ' → ' + (p.get('var-end_snap') || '-');
    document.getElementById('recSQLs').textContent =
      (ftype === 'wait' ? 'Likely top SQLs near event window' : '—');
    document.getElementById('recSegments').textContent =
      (ftype !== 'segment' ? 'Hot segments by IO/Contention' : '—');

    // Load recommendation rules
    fetch('/public/data/recommendation_rulesv1.1.json', { cache: 'no-store' })
      .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.json(); })
      .then(function(d){
        var key = ftype + ':' + fval;
        var txt = d[key] || d[ftype + ':*'] || 'No recommendation found for this selection.';
        document.getElementById('recText').textContent = txt;
      })
      .catch(function(){
        document.getElementById('recText').textContent = 'Could not load recommendations file.';
      });
  }catch(e){
    console.log('drawer helper error', e);
  }
})();
</script>
</body>
</html>
