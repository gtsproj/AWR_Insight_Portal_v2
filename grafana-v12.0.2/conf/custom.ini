[auth.anonymous]
enabled = true
org_name = Avekshaa
org_role = Viewer
hide_version = true

[auth]
disable_login_form = false

[security]
allow_embedding = true

[snapshots]
# Disable snapshot creation and external sharing
# This removes the "Publish to snapshots.raintank.io" option from the Share menu
enabled = false
external_enabled = false

[users]
# Viewers cannot edit dashboards (already the default — kept explicit for clarity)
viewers_can_edit = false
