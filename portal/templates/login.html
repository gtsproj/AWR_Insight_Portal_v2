<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AWR Insight Portal — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0e1a;--surface:#141829;--surface2:#1e2340;--accent:#f59e0b;
      --danger:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--border:#1e2340;--radius:8px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;
     min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-wrap{width:100%;max-width:400px;padding:24px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo img{height:48px;margin-bottom:12px}
.login-logo h1{font-size:1.2rem;color:var(--accent);font-weight:700}
.login-logo p{font-size:.8rem;color:var(--text2);margin-top:4px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
.login-card h2{font-size:1rem;font-weight:600;margin-bottom:20px;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;color:var(--text2);margin-bottom:5px}
.field input{width:100%;background:var(--surface2);border:1px solid var(--border);
             color:var(--text);padding:10px 12px;border-radius:var(--radius);
             font-size:.9rem;outline:none;transition:.15s}
.field input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#000;border:none;
           border-radius:var(--radius);font-size:1rem;font-weight:700;cursor:pointer;
           margin-top:8px;transition:.15s}
.login-btn:hover{opacity:.85}
.error{background:#ef444415;border:1px solid #ef444440;color:#ef4444;
       padding:8px 12px;border-radius:var(--radius);font-size:.82rem;margin-bottom:14px}
.forgot-link{text-align:center;margin-top:14px;font-size:.82rem;color:var(--text2)}
.forgot-link a{color:var(--accent);text-decoration:none}
.forgot-link a:hover{text-decoration:underline}
.mode-pill{display:inline-block;font-size:.72rem;padding:2px 10px;border-radius:10px;margin-top:8px}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <img src="/static/logo.jpg" alt="Avekshaa">
    <h1>⚡ AWR Insight Portal</h1>
    <p>Oracle Performance Analysis Platform</p>
    {% if ai_mode == 'local_ai' %}
    <div class="mode-pill" style="background:#4a90d920;color:#4a90d9;border:1px solid #4a90d940">🖥️ Local AI mode</div>
    {% elif ai_mode == 'cloud_ai' %}
    <div class="mode-pill" style="background:#f59e0b20;color:#f59e0b;border:1px solid #f59e0b40">☁️ Cloud AI mode</div>
    {% else %}
    <div class="mode-pill" style="background:#10b98120;color:#10b981;border:1px solid #10b98140">⚙️ Rules mode</div>
    {% endif %}
  </div>
  <div class="login-card">
    <h2>Sign in to continue</h2>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/login">
      <input type="hidden" name="next_url" value="{{ next or '/' }}">
      <div class="field">
        <label>Username</label>
        <input type="text" name="username" value="{{ username or '' }}"
               autofocus autocomplete="username" placeholder="Enter username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password"
               autocomplete="current-password" placeholder="Enter password">
      </div>
      <button type="submit" class="login-btn">Sign In →</button>
    </form>
    <div class="forgot-link">
      <a href="/forgot-password">Forgot password?</a>
    </div>
  </div>
</div>
</body>
</html>
